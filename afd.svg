<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #2C2C2A; }
    .th  { font-size: 14px; font-weight: 600; }
    .ts  { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .arr { stroke: #888780; stroke-width: 1; fill: none; marker-end: url(#arrow); }
  </style>
</defs>

<!-- fundo branco -->
<rect width="680" height="420" fill="white"/>

<!-- estado_inicial -->
<rect x="250" y="165" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="189" text-anchor="middle" fill="#3C3489">estado_inicial</text>
<text class="ts" x="340" y="208" text-anchor="middle" fill="#534AB7">ponto de entrada do AFD</text>

<!-- estado_numero -->
<rect x="40" y="165" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="120" y="189" text-anchor="middle" fill="#085041">estado_numero</text>
<text class="ts" x="120" y="208" text-anchor="middle" fill="#0F6E56">dígitos e ponto decimal</text>

<!-- estado_palavra -->
<rect x="480" y="165" width="160" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="560" y="189" text-anchor="middle" fill="#712B13">estado_palavra</text>
<text class="ts" x="560" y="208" text-anchor="middle" fill="#993C1D">letras — MEM ou RES</text>

<!-- seta entrada -->
<line x1="340" y1="40" x2="340" y2="162" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="30">início</text>

<!-- estado_inicial -> estado_numero -->
<path d="M250 183 L202 183" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="217" y="172" text-anchor="middle">dígito ou '-'</text>

<!-- estado_numero -> estado_inicial -->
<path d="M202 203 L250 203" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="217" y="220" text-anchor="middle">fim do número</text>

<!-- estado_inicial -> estado_palavra -->
<path d="M430 183 L478 183" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="462" y="172" text-anchor="middle">letra</text>

<!-- estado_palavra -> estado_inicial -->
<path d="M478 203 L430 203" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="462" y="220" text-anchor="middle">fim da palavra</text>

<!-- self-loop estado_inicial -->
<path d="M310 165 Q260 100 340 100 Q420 100 370 165" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="88" text-anchor="middle">op / '(' ')' / espaço</text>

<!-- token número -->
<rect x="20" y="280" width="200" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="120" y="298" text-anchor="middle" fill="#2C2C2A">token: número</text>
<text class="ts" x="120" y="316" text-anchor="middle">ex: 3.14 / -2 / 10</text>
<line x1="120" y1="221" x2="120" y2="278" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- token palavra -->
<rect x="460" y="280" width="200" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="560" y="298" text-anchor="middle" fill="#2C2C2A">token: palavra</text>
<text class="ts" x="560" y="316" text-anchor="middle">RES / identificador MEM</text>
<line x1="560" y1="221" x2="560" y2="278" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- token operador -->
<rect x="215" y="280" width="250" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="298" text-anchor="middle" fill="#2C2C2A">token: operador / parêntese</text>
<text class="ts" x="340" y="316" text-anchor="middle">+ - * / // % ^ ( )</text>
<line x1="340" y1="221" x2="340" y2="278" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- ValueError -->
<rect x="250" y="358" width="180" height="40" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="340" y="374" text-anchor="middle" fill="#791F1F">ValueError</text>
<text class="ts" x="340" y="391" text-anchor="middle" fill="#A32D2D">token inválido</text>
<line x1="340" y1="324" x2="340" y2="356" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="392" y="344">char desconhecido</text>
</svg>
